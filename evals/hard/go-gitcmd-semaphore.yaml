id: go-gitcmd-semaphore
name: Fix Runner concurrency limit
files:
  go.mod: |
    module evalcase

    go 1.21
  runner.go: |
    package gitcmd

    import (
        "bytes"
        "context"
        "fmt"
        "io"
        "os/exec"
    )

    const defaultMaxConcurrent = 16

    // Runner limits the number of concurrent git subprocesses via an internal
    // semaphore.
    type Runner struct {
        sem chan struct{}
    }

    // New creates a Runner that allows at most maxConcurrent simultaneous git
    // subprocesses. If maxConcurrent <= 0 the default (16) is used.
    func New(maxConcurrent int) *Runner {
        if maxConcurrent <= 0 {
            maxConcurrent = defaultMaxConcurrent
        }
        return &Runner{sem: make(chan struct{}, defaultMaxConcurrent)}
    }

    func (r *Runner) acquire(ctx context.Context) error {
        if r.sem == nil {
            return fmt.Errorf("gitcmd.Runner not initialized; use gitcmd.New()")
        }
        select {
        case r.sem <- struct{}{}:
            return nil
        case <-ctx.Done():
            return ctx.Err()
        }
    }

    func (r *Runner) release() { <-r.sem }

    // Run executes a git command and returns the combined stdout+stderr output.
    func (r *Runner) Run(ctx context.Context, repoDir string, args ...string) (string, error) {
        if err := r.acquire(ctx); err != nil {
            return "", err
        }
        defer r.release()

        cmd := exec.CommandContext(ctx, "git", args...)
        cmd.Dir = repoDir
        out, err := cmd.CombinedOutput()
        return string(out), err
    }

    // Output executes a git command and returns stdout only.
    func (r *Runner) Output(ctx context.Context, repoDir string, args ...string) ([]byte, error) {
        if err := r.acquire(ctx); err != nil {
            return nil, err
        }
        defer r.release()

        cmd := exec.CommandContext(ctx, "git", args...)
        cmd.Dir = repoDir
        return cmd.Output()
    }

    // RunSplit executes a git command and returns stdout and stderr separately.
    func (r *Runner) RunSplit(ctx context.Context, repoDir string, args ...string) (string, string, error) {
        if err := r.acquire(ctx); err != nil {
            return "", "", err
        }
        defer r.release()

        cmd := exec.CommandContext(ctx, "git", args...)
        cmd.Dir = repoDir

        var stdout, stderr bytes.Buffer
        cmd.Stdout = &stdout
        cmd.Stderr = &stderr

        err := cmd.Run()
        return stdout.String(), stderr.String(), err
    }

    // Stream acquires the semaphore, starts a git command, and passes its stdout
    // as an io.Reader to consume.
    func (r *Runner) Stream(ctx context.Context, repoDir string, consume func(stdout io.Reader) error, args ...string) error {
        if err := r.acquire(ctx); err != nil {
            return err
        }
        defer r.release()

        cmd := exec.CommandContext(ctx, "git", args...)
        cmd.Dir = repoDir

        var stderrBuf bytes.Buffer
        cmd.Stderr = &stderrBuf

        stdoutPipe, err := cmd.StdoutPipe()
        if err != nil {
            return err
        }

        if err := cmd.Start(); err != nil {
            return err
        }

        consumeErr := consume(stdoutPipe)
        if consumeErr != nil {
            cmd.Process.Kill()
        }
        waitErr := cmd.Wait()

        if consumeErr != nil {
            return consumeErr
        }
        if waitErr != nil {
            if stderrBuf.Len() > 0 {
                return fmt.Errorf("%w: %s", waitErr, stderrBuf.String())
            }
            return waitErr
        }
        return nil
    }
  runner_test.go: |
    package gitcmd

    import (
        "context"
        "io"
        "os"
        "os/exec"
        "path/filepath"
        "strings"
        "testing"
        "time"
    )

    func initRepo(t *testing.T) string {
        t.Helper()
        dir := t.TempDir()
        run := func(args ...string) {
            cmd := exec.Command("git", args...)
            cmd.Dir = dir
            cmd.Env = append(os.Environ(),
                "GIT_AUTHOR_NAME=test",
                "GIT_AUTHOR_EMAIL=test@test.com",
                "GIT_COMMITTER_NAME=test",
                "GIT_COMMITTER_EMAIL=test@test.com",
            )
            out, err := cmd.CombinedOutput()
            if err != nil {
                t.Fatalf("git %v: %v\n%s", args, err, out)
            }
        }
        run("init")
        run("config", "user.email", "test@test.com")
        run("config", "user.name", "test")
        if err := os.WriteFile(filepath.Join(dir, "hello.txt"), []byte("hello\n"), 0644); err != nil {
            t.Fatal(err)
        }
        run("add", "hello.txt")
        run("commit", "-m", "init")
        return dir
    }

    func TestRunner_New(t *testing.T) {
        r := New(0)
        if r == nil {
            t.Fatal("New(0) returned nil")
        }
        if cap(r.sem) != defaultMaxConcurrent {
            t.Errorf("default capacity = %d, want %d", cap(r.sem), defaultMaxConcurrent)
        }

        r2 := New(4)
        if cap(r2.sem) != 4 {
            t.Errorf("capacity = %d, want 4", cap(r2.sem))
        }
    }

    func TestRunner_Run(t *testing.T) {
        dir := initRepo(t)
        r := New(2)

        out, err := r.Run(context.Background(), dir, "log", "--oneline")
        if err != nil {
            t.Fatalf("Run error: %v", err)
        }
        if !strings.Contains(out, "init") {
            t.Errorf("expected 'init' in output: %q", out)
        }
    }

    func TestRunner_Output(t *testing.T) {
        dir := initRepo(t)
        r := New(2)

        out, err := r.Output(context.Background(), dir, "rev-parse", "HEAD")
        if err != nil {
            t.Fatalf("Output error: %v", err)
        }
        hash := strings.TrimSpace(string(out))
        if len(hash) != 40 {
            t.Errorf("expected 40-char hash, got %q", hash)
        }
    }

    func TestRunner_Stream(t *testing.T) {
        dir := initRepo(t)
        r := New(2)

        var content string
        err := r.Stream(context.Background(), dir, func(stdout io.Reader) error {
            data, err := io.ReadAll(stdout)
            if err != nil {
                return err
            }
            content = string(data)
            return nil
        }, "show", "HEAD:hello.txt")
        if err != nil {
            t.Fatalf("Stream error: %v", err)
        }
        if content != "hello\n" {
            t.Errorf("Stream content = %q, want %q", content, "hello\n")
        }
    }

    func TestRunner_AcquireTimeout(t *testing.T) {
        r := New(1)
        r.sem <- struct{}{}

        ctx, cancel := context.WithTimeout(context.Background(), 50*time.Millisecond)
        defer cancel()

        _, err := r.Run(ctx, ".", "status")
        if err == nil {
            t.Error("expected timeout error when semaphore full")
        }
    }
task: "The Runner.New concurrency limit is broken: it does not honor the maxConcurrent argument, so callers cannot configure the limit and a semaphore created with a small limit never blocks. Find and fix the defect in runner.go so the semaphore capacity equals the requested maxConcurrent (after applying the <=0 default). All tests must pass. Do NOT modify runner_test.go."
expect:
  program: go
  args: ["test", "./..."]
