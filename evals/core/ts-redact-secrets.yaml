id: ts-redact-secrets
name: Redact credential-like object keys recursively
files:
  package.json: '{"type":"module"}'
  src.ts: |
    export function redact(value: unknown): unknown { return value; }
  spec.ts: |
    import test from "node:test"; import assert from "node:assert/strict"; import { redact } from "./src.ts";
    test("redacts", () => { const input={name:"ok",apiKey:"a",nested:{access_token:"b",items:[{password:"c"}]}}; assert.deepEqual(redact(input),{name:"ok",apiKey:"[REDACTED]",nested:{access_token:"[REDACTED]",items:[{password:"[REDACTED]"}]}}); assert.equal(input.apiKey,"a"); });
task: "Implement redact recursively for objects and arrays. Replace values whose case-insensitive key is apiKey, access_token, token, secret, or password with [REDACTED], and do not mutate input. Do not modify spec.ts."
expect: { program: node, args: [--test, spec.ts] }
