id: rust-parse-port
name: Parse a bounded TCP port without panics
files:
  Cargo.toml: |
    [package]
    name = "evalcase"
    version = "0.1.0"
    edition = "2021"
    [lib]
    path = "src/lib.rs"
  src/lib.rs: |
    pub fn parse_port(raw: &str) -> Result<u16, String> {
        Ok(raw.parse().unwrap())
    }
  tests/spec.rs: |
    use evalcase::parse_port;
    #[test]
    fn accepts_valid_and_rejects_invalid_ports() {
        assert_eq!(parse_port("443"), Ok(443));
        assert!(parse_port("0").is_err());
        assert!(parse_port("65536").is_err());
        assert!(parse_port("abc").is_err());
        assert!(parse_port(" 80 ").is_err());
    }
task: "Make parse_port return an error for non-numeric input, zero, values above 65535, and surrounding whitespace. It must never panic. Do not modify tests."
expect: { program: cargo, args: [test, --quiet] }
