id: reg-go-normalize-email
name: '[regression] Normalize and validate an email address'
files:
  go.mod: 'module evalcase

    go 1.21

    '
  email.go: "package evalcase\nimport \"strings\"\nfunc NormalizeEmail(raw string)\
    \ (string, bool) {\n    return strings.ToLower(raw), true\n}\n"
  email_test.go: "package evalcase\nimport \"testing\"\nfunc TestNormalizeEmail(t\
    \ *testing.T) {\n    if got, ok := NormalizeEmail(\" User@Example.COM \"); !ok\
    \ || got != \"user@example.com\" { t.Fatalf(\"%q %v\", got, ok) }\n    for _,\
    \ bad := range []string{\"\", \"a\", \"@x.com\", \"a@\", \"a@@x.com\", \"a b@x.com\"\
    } {\n        if _, ok := NormalizeEmail(bad); ok { t.Fatalf(\"accepted %q\", bad)\
    \ }\n    }\n}\n"
task: 'Implement conservative NormalizeEmail: trim surrounding whitespace, lowercase
  it, and reject empty, whitespace-containing, or malformed values that do not contain
  exactly one @ with non-empty sides. Do not modify tests.'
expect:
  program: go
  args:
  - test
  - ./...
