id: go-triple
name: Add a Go triple function
files:
  go.mod: |
    module evalcase

    go 1.21
  math.go: |
    package evalcase

    func Double(x int) int { return x * 2 }
  math_test.go: |
    package evalcase

    import "testing"

    func TestDouble(t *testing.T) {
        if Double(2) != 4 {
            t.Fatal("Double(2) should be 4")
        }
    }
task: "Add a function Triple(x int) int that returns x*3 to math.go, and a TestTriple in math_test.go asserting Triple(2) == 6."
expect:
  program: go
  args: ["test", "./..."]
