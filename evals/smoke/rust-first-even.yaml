id: rust-first-even
name: Return the first EVEN number, handle edge cases
files:
  Cargo.toml: |
    [package]
    name = "evalcase"
    version = "0.1.0"
    edition = "2021"
    [lib]
    path = "src/lib.rs"
  src/lib.rs: |
    /// BUG: returns the first element, not the first even one.
    pub fn first_even(v: &[i32]) -> Option<i32> {
        v.first().copied()
    }
  tests/spec.rs: |
    use evalcase::first_even;
    #[test]
    fn returns_first_even() {
        assert_eq!(first_even(&[1, 3, 4, 6]), Some(4));
    }
    #[test]
    fn none_when_no_even() {
        assert_eq!(first_even(&[1, 3, 5]), None);
    }
    #[test]
    fn none_when_empty() {
        assert_eq!(first_even(&[]), None);
    }
task: "Fix first_even so all tests in tests/spec.rs pass. Do NOT modify the tests."
expect:
  program: cargo
  args: ["test", "--quiet"]
